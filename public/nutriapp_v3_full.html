let PS={pp:"cardapio",checked:{},water:0,waterTarget:8,calTarget:1800,diaryText:"",diaryEmoji:"",diarySaved:null};
let AS={ap:"dash",selFb:null,relPat:null,relSearch:""};

function getTotals(){let cal=0,c=0,p=0,f=0;FOODS.forEach(food=>{if(PS.checked[food.id]){cal+=food.cal;c+=food.c;p+=food.p;f+=food.f;}});return{cal,c,p,f};}
function unread(){let n=0;PATS.forEach(pt=>{if(pt._fbUnread)n++;});return n+3;}
function adColor(v){return v>=80?"#639922":v>=60?"#C9963A":"#C0392B";}

function pCardapio(){
  const t=getTotals();
  const pct=Math.min(100,Math.round(t.cal/PS.calTarget*100));
  const circ=2*Math.PI*28;
  const off=circ-(pct/100)*circ;
  const meals=["Café","Almoço","Lanche","Jantar"];
  return`<div class="hero-card"><div class="hero-row"><div><div class="hero-greet">Olá, Maria 🌿</div><div class="hero-cal">${t.cal} <span style="font-size:14px;color:rgba(255,255,255,.5)">/ ${PS.calTarget} kcal</span></div><div class="hero-sub">CONSUMIDO HOJE</div></div><div class="ring-w"><svg width="72" height="72" class="ring-svg"><circle cx="36" cy="36" r="28" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="6"/><circle cx="36" cy="36" r="28" fill="none" stroke="#B8DECA" stroke-width="6" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}" style="transition:stroke-dashoffset .5s"/></svg><div class="ring-center"><div class="ring-pct">${pct}%</div><div class="ring-lbl">da meta</div></div></div></div></div>
<div class="macro-strip">${[["Carbos",t.c+"g","#C9963A",Math.round(t.c/200*100)],["Prot.",t.p+"g","#B85C38",Math.round(t.p/100*100)],["Lip.",t.f+"g","#185FA5",Math.round(t.f/65*100)],["kcal",t.cal,"#3D6B52",pct]].map(([l,v,col,pc])=>`<div class="mc"><div class="mc-v" style="color:${col}">${v}</div><div class="mc-l">${l}</div><div class="mc-bar"><div class="mc-fill" style="width:${Math.min(100,pc)}%;background:${col}"></div></div></div>`).join("")}</div>
<div class="water-card"><div class="water-top"><span class="water-title">💧 Hidratação</span><span class="water-ct">${PS.water}/${PS.waterTarget} copos</span></div><div class="glasses">${Array.from({length:PS.waterTarget},(_,i)=>`<div class="glass ${i<PS.water?"on":""}" data-g="${i}"><div class="glass-fill" style="height:${i<PS.water?"78%":"0"}"></div></div>`).join("")}</div></div>
${meals.map(meal=>{const mf=FOODS.filter(f=>f.meal===meal);return`<div class="pcard"><div class="pcard-title">${meal}</div>${mf.map(f=>`<div class="food-row"><div class="fchk ${PS.checked[f.id]?"on":""}" data-fid="${f.id}">${PS.checked[f.id]?"✓":""}</div><div style="flex:1"><div class="fname">${f.n}</div><div class="fqty">${f.qty}</div></div><div class="fkcal">${f.cal} kcal</div></div>`).join("")}</div>`;}).join("")}`;
}

function pCompras(){
  return Object.entries(SHOP_CATS).map(([cat,items])=>`<div class="pcard"><div class="pcard-title">${cat}</div>${items.map(item=>`<div class="food-row"><div class="fname">${item}</div></div>`).join("")}</div>`).join("")+`<div class="pcard" style="text-align:center;padding:16px"><div style="font-size:22px;margin-bottom:6px">📄</div><div style="font-size:12px;color:var(--color-text-secondary)">Exportar lista em PDF</div><button onclick="alert('PDF gerado!')" style="margin-top:8px;padding:6px 16px;background:#0A2E20;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:11px;cursor:pointer;font-family:var(--font-sans)">Gerar PDF</button></div>`;
}

function pInfo(){
  return INFO_FOODS.map(f=>`<div class="pcard"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${f.n}</span><span style="font-size:10px;padding:2px 8px;border-radius:10px;background:#E8F5EE;color:#0F6E56;font-weight:500">${f.tag}</span></div><div style="font-size:11px;color:var(--color-text-secondary);line-height:1.6">${f.txt}</div></div>`).join("");
}

function pDiario(){
  const saved=PS.diarySaved;
  const charLen=PS.diaryText.length;
  const warn=charLen>250;
  return`<div class="diary-card"><div class="diary-title"><span style="font-size:16px">📖</span><span>Meu Diário — ${new Date().toLocaleDateString("pt-BR",{day:"2-digit",month:"long"})}</span></div><div class="diary-notice"><strong>ℹ️ Este é seu diário pessoal.</strong> O registro de hoje poderá ser visualizado pela sua nutricionista para acompanhamento. Não é um canal de comunicação direta — para enviar mensagens, acesse o chat com a profissional.</div><div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px">Como você está se sentindo hoje?</div><div class="diary-emojis">${EMOJIS.map(e=>`<div class="diary-emoji ${PS.diaryEmoji===e?"sel":""}" data-e="${e}" title="${MOODS[e]||""}">${e}</div>`).join("")}</div>${saved?`<div class="diary-saved"><strong>✅ Diário do dia salvo!</strong> ${PS.diaryEmoji} "${PS.diaryEmoji?MOODS[PS.diaryEmoji]:""}"<br><span style="color:var(--color-text-secondary)">${saved.text}</span><div style="margin-top:6px;font-size:10px;color:var(--color-text-secondary)">Salvo às ${saved.time}</div></div><div class="diary-not-comms">🔒 Registro salvo. Você pode fazer apenas um registro por dia. Sua nutricionista poderá visualizar este registro no painel dela.</div>`:`<textarea class="diary-textarea" id="diary-ta" maxlength="300" placeholder="Escreva como você está se sentindo hoje... (máx. 300 caracteres)" oninput="PS.diaryText=this.value;rph()">${PS.diaryText}</textarea><div class="diary-footer"><span class="diary-chars ${warn?"warn":""}">${charLen}/300 caracteres</span><button class="diary-save-btn" onclick="saveDiary()" ${!PS.diaryText.trim()&&!PS.diaryEmoji?"disabled":""}>💾 Salvar diário</button></div><div class="diary-not-comms">💬 Este campo não é uma mensagem para a nutricionista. É apenas um registro pessoal do seu bem-estar diário que ela poderá visualizar para acompanhar sua evolução.</div>`}</div>`;
}

function saveDiary(){
  if(!PS.diaryText.trim()&&!PS.diaryEmoji)return;
  const now=new Date();
  const time=now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
  PS.diarySaved={text:PS.diaryText||"(sem texto)",emoji:PS.diaryEmoji,time,date:TODAY};
  PATS[0]._diary=PS.diarySaved;
  PATS[0]._fbUnread=true;
  rph();radmin();
}

function rph(){
  const pages={cardapio:pCardapio,compras:pCompras,info:pInfo,diario:pDiario};
  const c=document.getElementById("ph-content");
  if(c)c.innerHTML=(pages[PS.pp]||pCardapio)();
  document.querySelectorAll(".pn").forEach(b=>b.classList.toggle("on",b.dataset.pp===PS.pp));
  document.querySelectorAll("[data-fid]").forEach(el=>{el.onclick=()=>{const id=parseInt(el.dataset.fid);PS.checked[id]=!PS.checked[id];rph();};});
  document.querySelectorAll("[data-g]").forEach(g=>{g.onclick=()=>{const i=parseInt(g.dataset.g);PS.water=i<PS.water?i:i+1;rph();};});
  document.querySelectorAll("[data-e]").forEach(el=>{el.onclick=()=>{PS.diaryEmoji=PS.diaryEmoji===el.dataset.e?"":el.dataset.e;rph();};});
}

function aDash(){
  const avg=Math.round(PATS.reduce((a,p)=>a+p.adh,0)/PATS.length);
  return`<div class="asec">Visão geral</div><div class="stat-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:10px"><div class="stat-c"><div class="stat-v">${PATS.length}</div><div class="stat-l">Pacientes</div><div class="stat-t up">↑ ativos</div></div><div class="stat-c"><div class="stat-v">${avg}%</div><div class="stat-l">Adesão média</div><div class="stat-t up">↑ boa</div></div><div class="stat-c"><div class="stat-v">${unread()}</div><div class="stat-l">Feedbacks</div><div class="stat-t dn">pendentes</div></div></div><div class="acard"><div class="asec">Adesão por paciente</div>${PATS.map(p=>`<div class="adh-row"><div class="adh-nm" style="font-size:11px">${p.n.split(" ")[0]}</div><div class="adh-bar"><div class="adh-fill" style="width:${p.adh}%;background:${adColor(p.adh)}"></div></div><div class="adh-pct">${p.adh}%</div></div>`).join("")}</div><div class="acard"><div class="asec">Feedbacks recentes</div>${PATS.filter(p=>p._diary).slice(0,2).map(p=>`<div class="fb-item ${p._fbUnread?"unread":""}" onclick="AS.ap='feedback';AS.selFb=p.id;radmin()"><div class="fb-top"><div class="fb-av" style="background:${p.bg};color:${p.cl}">${p.in}</div><span class="fb-name" style="font-size:12px">${p.n}</span><span class="fb-mood">${p._diary.emoji}</span><span class="fb-time">${p._diary.time}</span></div><div class="fb-text">${p._diary.text}</div></div>`).join("")||`<div style="font-size:12px;color:var(--color-text-secondary);text-align:center;padding:16px">Nenhum feedback hoje ainda.</div>`}</div>`;
}

function aPac(){
  return`<div class="asec">Pacientes cadastrados</div>${PATS.map(p=>`<div class="acard" style="cursor:pointer" onclick="AS.ap='plano';radmin()"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><div class="fb-av" style="background:${p.bg};color:${p.cl};width:36px;height:36px">${p.in}</div><div><div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">${p.n}</div><div style="font-size:11px;color:var(--color-text-secondary)">${p.age} anos · ${p.w}kg${p.bf?` · BF ${p.bf}%`:""}</div></div><div style="margin-left:auto;display:flex;gap:4px">${p.conds.map(c=>`<span style="font-size:10px;padding:2px 7px;border-radius:10px;background:#E8F5EE;color:#0F6E56;font-weight:500">${c}</span>`).join("")}</div></div><div class="adh-row"><div class="adh-bar"><div class="adh-fill" style="width:${p.adh}%;background:${adColor(p.adh)}"></div></div><span style="font-size:11px;color:var(--color-text-secondary);margin-left:8px">${p.adh}% adesão</span></div></div>`).join("")}<button onclick="alert('Novo paciente')" style="width:100%;padding:10px;border:1.5px dashed var(--color-border-tertiary);border-radius:var(--border-radius-md);background:transparent;font-family:var(--font-sans);font-size:13px;cursor:pointer;color:var(--color-text-secondary)">+ Novo paciente</button>`;
}

function aPlano(){
  return`<div class="acard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div class="fb-av" style="background:#E8F5EE;color:#3D6B52;width:40px;height:40px">MS</div><div><div style="font-size:13px;font-weight:500;color:var(--color-text-primary)">Maria Silva</div><div style="font-size:11px;color:var(--color-text-secondary)">Meta: 1.800 kcal · P:115g C:175g L:65g</div></div><select style="margin-left:auto;padding:6px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);font-family:var(--font-sans);font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary)">${PATS.map(p=>`<option>${p.n}</option>`).join("")}</select></div></div><div class="acard"><div class="asec">🔍 Busca TACO</div><input class="rel-search" style="width:100%;margin-bottom:8px" placeholder="Pesquisar alimento (ex: frango, aveia)..."><div style="font-size:12px;color:var(--color-text-secondary);text-align:center;padding:16px">Selecione um alimento para adicionar ao plano do paciente.</div></div>`;
}

function aFeedback(){
  const mockFb=[
    {pid:2,pn:"João Costa",in:"JC",cl:"#1E4D7B",bg:"#E3EFF8",emoji:"😟",text:"Tive dificuldade no almoço hoje, saí para reunião e comi fora do plano.",time:"Ontem 18:40",unread:true},
    {pid:3,pn:"Ana Ferreira",in:"AF",cl:"#993C1D",bg:"#FAECE7",emoji:"💪",text:"Semana ótima! Todos os treinos feitos e adesão 100%.",time:"Ontem 12:00",unread:true},
    {pid:1,pn:"Maria Silva",in:"MS",cl:"#3D6B52",bg:"#E8F5EE",emoji:"🤔",text:"Posso substituir o salmão? Estava caro essa semana.",time:"2 dias atrás",unread:false},
  ];
  const diaryFb=PATS.filter(p=>p._diary).map(p=>({pid:p.id,pn:p.n,in:p.in,cl:p.cl,bg:p.bg,emoji:p._diary.emoji||"📖",text:p._diary.text,time:`Hoje ${p._diary.time}`,unread:p._fbUnread,isDiary:true}));
  const allFb=[...diaryFb,...mockFb];
  const sel=AS.selFb!=null?allFb.find(f=>f.pid===AS.selFb):null;
  return`<div style="display:grid;grid-template-columns:1fr 1.3fr;gap:10px;height:100%"><div><div class="asec">Feedbacks recebidos</div><div style="background:#FDF3E0;border-radius:var(--border-radius-md);padding:8px 10px;font-size:11px;color:#633806;margin-bottom:10px;border:0.5px solid rgba(201,150,58,.25)">📖 Entradas do <strong>diário pessoal</strong> dos pacientes são exibidas aqui para acompanhamento clínico.</div>${allFb.map(f=>`<div class="fb-item ${f.unread?"unread":""}" onclick="AS.selFb=${f.pid};radmin()"><div class="fb-top"><div class="fb-av" style="background:${f.bg};color:${f.cl}">${f.in}</div><span class="fb-name" style="font-size:12px">${f.pn}</span>${f.isDiary?`<span style="font-size:9px;padding:1px 6px;border-radius:8px;background:#E8F5EE;color:#3D6B52;font-weight:500">DIÁRIO</span>`:""}<span class="fb-mood">${f.emoji}</span><span class="fb-time">${f.time}</span></div><div class="fb-text">${f.text}</div></div>`).join("")}</div><div>${sel?`<div class="asec">Feedback — ${sel.pn}</div><div class="fb-detail"><div class="fb-detail-head"><div class="fb-av" style="background:${sel.bg};color:${sel.cl};width:38px;height:38px">${sel.in}</div><div><div style="font-size:13px;font-weight:500">${sel.pn} ${sel.emoji}</div><div style="font-size:11px;color:var(--color-text-secondary)">${sel.time}</div></div></div>${sel.isDiary?`<div class="fb-notice-box">📖 <strong>Entrada do Diário Pessoal</strong> — este registro foi feito pelo paciente no diário. Não é uma mensagem direta.</div>`:""}<div class="fb-detail-body">${sel.text}</div><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">Responder ao paciente:</div><textarea class="fb-resp-area" placeholder="Escreva sua resposta ou anotação clínica..."></textarea><div style="display:flex;gap:8px;margin-top:8px"><button class="btn-primary-sm" onclick="alert('Resposta enviada!')">📤 Responder</button><button class="btn-xs" onclick="AS.ap='plano';radmin()">🥗 Ver plano</button></div></div>`:`<div style="text-align:center;padding:40px 16px;color:var(--color-text-secondary)"><div style="font-size:28px;margin-bottom:8px">💬</div><div style="font-size:13px">Selecione um feedback para visualizar</div></div>`}</div></div>`;
}

function aRelatorios(){
  const selPat=AS.relPat!=null?PATS.find(p=>p.id===AS.relPat):null;
  const filtered=AS.relSearch?PATS.filter(p=>p.n.toLowerCase().includes(AS.relSearch.toLowerCase())):PATS;
  const wv=[68,72,76,80,78,84,80];
  return`<div class="acard"><div class="asec">Filtrar por paciente</div><div class="rel-filter"><input class="rel-search" id="rel-search" placeholder="Pesquisar paciente..." value="${AS.relSearch}" oninput="AS.relSearch=this.value;radmin()">${AS.relPat!=null?`<button class="btn-xs" onclick="AS.relPat=null;AS.relSearch='';radmin()">✕ Limpar</button>`:""}</div><div>${filtered.map(p=>`<div class="pat-opt ${AS.relPat===p.id?"sel":""}" onclick="AS.relPat=${p.id};AS.relSearch='';radmin()"><div class="pat-av-sm" style="background:${p.bg};color:${p.cl}">${p.in}</div><div style="flex:1"><div style="font-size:12px;font-weight:500;color:var(--color-text-primary)">${p.n}</div><div style="font-size:10px;color:var(--color-text-secondary)">${p.conds.join(", ")}</div></div><span style="font-size:11px;font-weight:500;color:${adColor(p.adh)}">${p.adh}%</span></div>`).join("")}</div></div>${selPat?`<div class="acard"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px"><div class="fb-av" style="background:${selPat.bg};color:${selPat.cl};width:40px;height:40px">${selPat.in}</div><div><div style="font-size:14px;font-weight:500;color:var(--color-text-primary)">${selPat.n}</div><div style="font-size:11px;color:var(--color-text-secondary)">${selPat.age} anos · ${selPat.w}kg · ${selPat.h}cm · ${selPat.conds.join(", ")}</div></div></div><div class="stat-grid"><div class="stat-c"><div class="stat-v">${selPat.adh}%</div><div class="stat-l">Adesão semanal</div><div class="stat-t ${selPat.adh>=75?"up":"dn"}">${selPat.adh>=75?"↑ Ótima":"↓ Atenção"}</div></div><div class="stat-c"><div class="stat-v">${selPat.w}kg</div><div class="stat-l">Peso atual</div><div class="stat-t up">↑ registrado</div></div></div><div style="font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px">Adesão calórica — 7 dias</div><div class="bar-chart">${wv.map((v,i)=>{const d=["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"];const h=Math.round(v/100*60);return`<div class="bc-col"><div class="bc-val">${v}%</div><div class="bc-bar" style="height:${h}px;background:${adColor(v)}"></div><div class="bc-lbl">${d[i]}</div></div>`;}).join("")}</div>${selPat._diary?`<div style="margin-top:10px;background:#E8F5EE;border-radius:var(--border-radius-md);padding:10px;font-size:12px;color:#3D6B52"><strong>📖 Último diário:</strong> ${selPat._diary.emoji} "${selPat._diary.text}" — ${selPat._diary.time}</div>`:""}</div>`:
  `<div style="text-align:center;padding:30px 16px;color:var(--color-text-secondary)"><div style="font-size:28px;margin-bottom:8px">👤</div><div style="font-size:13px">Selecione um paciente acima para ver seus relatórios individuais</div></div>`}`;
}

function aIA(){
  return`<div class="acard" style="text-align:center;padding:24px"><div style="font-size:28px;margin-bottom:8px">🧠</div><div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px">IA Consultora Nutricional</div><div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:14px">Consulte alimentos para patologias com mecanismos de ação baseados em evidências.</div><div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">${["Depressão","Ansiedade","Hipertensão","Diabetes t.2","Anemia","Hipotireoidismo","Dislipidemia","Osteoporose"].map(p=>`<span onclick="alert('Consultando IA sobre: ${p}')" style="padding:5px 10px;border-radius:10px;font-size:11px;cursor:pointer;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);background:var(--color-background-secondary)">${p}</span>`).join("")}</div><input style="width:100%;margin-top:12px;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);font-family:var(--font-sans);font-size:12px;background:var(--color-background-primary);color:var(--color-text-primary)" placeholder="Pergunte sobre nutrição clínica funcional..."></div>`;
}

function radmin(){
  const pages={dash:aDash,pac:aPac,plano:aPlano,feedback:aFeedback,relatorios:aRelatorios,ia:aIA};
  const c=document.getElementById("admin-content");
  if(c)c.innerHTML=(pages[AS.ap]||aDash)();
  document.querySelectorAll(".asi").forEach(b=>b.classList.toggle("on",b.dataset.ap===AS.ap));
  const titles={dash:"Dashboard",pac:"Pacientes",plano:"Plano Alimentar",feedback:"Feedback dos Pacientes",relatorios:"Relatórios",ia:"IA Consultora"};
  const t=document.getElementById("admin-title");
  if(t)t.textContent=titles[AS.ap]||"";
  const b=document.getElementById("abadge");
  if(b){const n=unread();b.textContent=n;b.style.display=n?"inline":"none";}
}

document.querySelectorAll(".pn").forEach(b=>{b.onclick=()=>{PS.pp=b.dataset.pp;rph();};});
document.querySelectorAll(".asi").forEach(b=>{b.onclick=()=>{AS.ap=b.dataset.ap;radmin();};});
function logout(){window.location.href="/";}

function tick(){const el=document.getElementById("pclock");if(el){const n=new Date();el.textContent=n.getHours().toString().padStart(2,"0")+":"+n.getMinutes().toString().padStart(2,"0");}}
tick();setInterval(tick,10000);
rph();
radmin();
</script>
</body>
</html>
